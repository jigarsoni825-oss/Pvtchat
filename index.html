<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IG Direct</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #fafafa; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        /* Login Screen */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        #login-screen h2 { margin-bottom: 20px; font-style: italic; font-size: 2.5rem; font-weight: 600; }
        #login-screen input { width: 100%; max-width: 300px; padding: 14px; border-radius: 5px; border: 1px solid #363636; background: #121212; color: white; margin-bottom: 15px; outline: none; }
        #login-screen button { width: 100%; max-width: 300px; background-color: #0095f6; color: white; border: none; padding: 14px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Header */
        .header { background-color: #000000; padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid #262626; z-index: 10; }
        .back-btn { background: none; border: none; color: #fafafa; font-size: 1.5rem; cursor: pointer; margin-right: 15px; display: flex; align-items: center; }
        .header-title { font-size: 1.1rem; font-weight: 600; flex: 1; }
        
        /* Contacts Screen */
        #contacts-screen { flex-direction: column; height: 100%; }
        #user-list { flex: 1; overflow-y: auto; padding-top: 10px; }
        .contact-card { display: flex; align-items: center; padding: 10px 20px; cursor: pointer; }
        .contact-card:active { background: #121212; }
        .avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); padding: 2px; margin-right: 15px; position: relative; }
        .avatar-inner { width: 100%; height: 100%; background-color: #262626; border-radius: 50%; border: 2px solid #000; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; }
        .online-dot { width: 16px; height: 16px; background-color: #78de45; border: 3px solid #000; border-radius: 50%; position: absolute; bottom: 0; right: 0; }
        .contact-info { flex: 1; }
        .contact-name { font-size: 1rem; font-weight: 400; }
        .contact-status { font-size: 0.85rem; color: #8e8e93; margin-top: 2px; }

        /* Chat Screen */
        #chat-screen { flex-direction: column; height: 100%; }
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; margin-bottom: 6px; }
        .message-wrapper.sent { align-self: flex-end; }
        .message-wrapper.received { align-self: flex-start; }
        .message { padding: 10px 14px; border-radius: 22px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .message-wrapper.sent .message { background-color: #3797f0; color: white; border-bottom-right-radius: 4px; }
        .message-wrapper.received .message { background-color: #262626; color: white; border-bottom-left-radius: 4px; }
        
        /* Input Area */
        .input-area { padding: 10px 15px 20px 15px; display: flex; align-items: center; background: #000; border-top: 1px solid #262626; }
        .input-box { flex: 1; display: flex; align-items: center; background-color: #262626; border-radius: 24px; padding: 8px 15px; }
        #message-input { flex: 1; background: transparent; border: none; color: white; font-size: 0.95rem; outline: none; padding: 5px 0; }
        #send-btn { background: none; border: none; color: #0095f6; font-weight: 600; font-size: 0.95rem; cursor: pointer; padding-left: 10px; }
        #send-btn:disabled { color: #005084; cursor: default; }
    </style>
</head>
<body>

    <audio id="notify-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="login-screen">
        <h2>Instagram</h2>
        <input type="text" id="username-input" placeholder="Username" autocomplete="off">
        <button id="login-btn">Log In</button>
    </div>

    <div id="contacts-screen" class="hidden">
        <div class="header">
            <div class="header-title" id="my-username-display">DirectMessages</div>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="hidden">
        <div class="header">
            <button class="back-btn" id="back-btn">‹</button>
            <div class="header-title" id="chat-header-name">User</div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="message-input" placeholder="Message..." autocomplete="off">
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, setDoc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAi1KZ89UZmut2d7DIi2YiWxQFDQdEpjR8",
            authDomain: "pvtcht-panda.firebaseapp.com",
            projectId: "pvtcht-panda",
            storageBucket: "pvtcht-panda.firebasestorage.app",
            messagingSenderId: "755859453943",
            appId: "1:755859453943:web:808c5a2ecd754a947ca0f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core Variables
        let myUserId = localStorage.getItem("igCloneUid");
        if (!myUserId) { myUserId = "uid_" + Date.now(); localStorage.setItem("igCloneUid", myUserId); }
        let myName = localStorage.getItem("igCloneName"); // Persistent memory check
        let activeRoom = null;
        let unsubscribeChat = null;

        const ui = {
            screens: { login: document.getElementById("login-screen"), contacts: document.getElementById("contacts-screen"), chat: document.getElementById("chat-screen") },
            inputs: { name: document.getElementById("username-input"), msg: document.getElementById("message-input") },
            buttons: { login: document.getElementById("login-btn"), back: document.getElementById("back-btn"), send: document.getElementById("send-btn") },
            displays: { myName: document.getElementById("my-username-display"), userList: document.getElementById("user-list"), chatBox: document.getElementById("chat-box"), chatName: document.getElementById("chat-header-name") },
            sound: document.getElementById("notify-sound")
        };

        // 1. PERSISTENT LOGIN LOGIC
        if (myName) {
            // User exists in memory, skip login screen instantly
            executeLogin(myName);
        }

        ui.buttons.login.addEventListener("click", () => {
            const name = ui.inputs.name.value.trim();
            if (name) executeLogin(name);
        });

        async function executeLogin(name) {
            myName = name;
            localStorage.setItem("igCloneName", myName); // Save permanently to browser
            ui.displays.myName.textContent = myName;
            
            // Register online status
            await setDoc(doc(db, "users", myUserId), { name: myName, online: true, lastUpdate: Date.now() }, { merge: true });
            
            showScreen('contacts');
            loadContacts();
        }

        // Keep status updated
        document.addEventListener("visibilitychange", () => {
            if(myName) updateDoc(doc(db, "users", myUserId), { online: document.visibilityState === 'visible' });
        });

        // 2. CONTACTS LIST
        function loadContacts() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                ui.displays.userList.innerHTML = "";
                snapshot.forEach(docSnap => {
                    if (docSnap.id === myUserId) return;
                    const data = docSnap.data();
                    const initial = data.name.charAt(0).toUpperCase();
                    const dot = data.online ? '<div class="online-dot"></div>' : '';
                    const statusTxt = data.online ? "Active now" : "Offline";
                    
                    const div = document.createElement("div");
                    div.className = "contact-card";
                    div.innerHTML = `
                        <div class="avatar"><div class="avatar-inner">${initial}</div>${dot}</div>
                        <div class="contact-info">
                            <div class="contact-name">${data.name}</div>
                            <div class="contact-status">${statusTxt}</div>
                        </div>`;
                    div.onclick = () => openChat(docSnap.id, data.name);
                    ui.displays.userList.appendChild(div);
                });
            });
        }

        // 3. CHAT ROOM
        function openChat(partnerId, partnerName) {
            ui.displays.chatName.textContent = partnerName;
            activeRoom = [myUserId, partnerId].sort().join("_");
            showScreen('chat');
            
            if (unsubscribeChat) unsubscribeChat();
            
            let firstLoad = true;
            unsubscribeChat = onSnapshot(query(collection(db, "messages"), where("room", "==", activeRoom), orderBy("time", "asc")), (snapshot) => {
                ui.displays.chatBox.innerHTML = "";
                snapshot.forEach(msgDoc => {
                    const msg = msgDoc.data();
                    const isMe = msg.sender === myUserId;
                    const wrap = document.createElement("div");
                    wrap.className = `message-wrapper ${isMe ? 'sent' : 'received'}`;
                    wrap.innerHTML = `<div class="message">${msg.text}</div>`;
                    
                    if (isMe) wrap.onclick = () => { if(confirm("Unsend message?")) deleteDoc(doc(db, "messages", msgDoc.id)); };
                    ui.displays.chatBox.appendChild(wrap);
                });

                if (!firstLoad && snapshot.docChanges().some(c => c.type === "added" && c.doc.data().sender !== myUserId)) {
                    ui.sound.play().catch(e=>console.log("Audio blocked"));
                }
                ui.displays.chatBox.scrollTop = ui.displays.chatBox.scrollHeight;
                firstLoad = false;
            });
        }

        ui.buttons.back.onclick = () => { activeRoom = null; showScreen('contacts'); };

        // 4. SENDING
        ui.inputs.msg.oninput = () => { ui.buttons.send.disabled = ui.inputs.msg.value.trim() === ""; };
        
        async function sendMsg() {
            const text = ui.inputs.msg.value.trim();
            if (!text || !activeRoom) return;
            ui.inputs.msg.value = "";
            ui.buttons.send.disabled = true;
            await addDoc(collection(db, "messages"), { room: activeRoom, text: text, sender: myUserId, time: Date.now() });
        }
        
        ui.buttons.send.onclick = sendMsg;
        ui.inputs.msg.onkeypress = (e) => { if (e.key === "Enter") sendMsg(); };

        function showScreen(name) {
            Object.values(ui.screens).forEach(s => s.classList.add("hidden"));
            ui.screens[name].classList.remove("hidden");
            ui.screens[name].style.display = "flex";
        }
    </script>
</body>
</html>
