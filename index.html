<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jarvis System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000000; display: flex; flex-direction: column; z-index: 10; }
        .center-screen { justify-content: center; align-items: center; padding: 20px; }
        h1.jarvis-title { color: #0b93f6; font-size: 3rem; margin-bottom: 30px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        h2 { margin-bottom: 20px; color: #ffffff; font-size: 1.5rem; }
        
        input { width: 100%; max-width: 320px; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #121212; color: white; margin-bottom: 15px; outline: none; font-size: 1rem; }
        input:focus { border-color: #0b93f6; }
        button.primary-btn { width: 100%; max-width: 320px; background-color: #0b93f6; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-bottom: 10px; }
        button.secondary-btn { width: 100%; max-width: 320px; background-color: #262626; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .admin-header { background: #121212; padding: 15px; text-align: center; border-bottom: 1px solid #333; position: relative; font-weight: bold; }
        .logout-btn { position: absolute; right: 15px; top: 15px; background: #ff3b30; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .admin-section { padding: 20px; border-bottom: 1px solid #333; display: flex; flex-direction: column; align-items: center; }
        
        .admin-user-card { background: #121212; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .log-card { background: #121212; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #333; font-size: 0.9rem; }
        .delete-btn { background: #ff3b30; color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .chat-header { background-color: #121212; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #262626; }
        .back-btn { background: none; border: none; color: #0b93f6; font-size: 1.5rem; cursor: pointer; margin-right: 15px; }
        .chat-header-info { flex: 1; display: flex; flex-direction: column; }
        .chat-header-name { font-size: 1.1rem; font-weight: bold; }
        .chat-header-status { font-size: 0.8rem; color: #34C759; }

        .contact-card { display: flex; align-items: center; padding: 15px; cursor: pointer; border-bottom: 1px solid #121212; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #0b93f6; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.2rem; margin-right: 15px; position: relative; }
        .online-dot { width: 14px; height: 14px; background-color: #34C759; border: 3px solid #000; border-radius: 50%; position: absolute; bottom: 0; right: 0; }
        .offline-dot { background-color: #8e8e93; }
        .contact-info { flex: 1; }
        .contact-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 3px; }
        .contact-status-text { font-size: 0.85rem; color: #8e8e93; }
        
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 80%; cursor: pointer; }
        .message-wrapper.sent { align-self: flex-end; }
        .message-wrapper.received { align-self: flex-start; }
        .message { padding: 12px 16px; border-radius: 20px; font-size: 1rem; line-height: 1.4; word-wrap: break-word; }
        .message-wrapper.sent .message { background-color: #0b93f6; color: white; border-bottom-right-radius: 4px; }
        .message-wrapper.received .message { background-color: #262626; color: white; border-bottom-left-radius: 4px; }
        .deleted-msg { background-color: #1e1e1e !important; color: #888 !important; font-style: italic; border: 1px solid #333; }
        
        .input-area { padding: 10px 15px 15px 15px; display: flex; align-items: center; background: #121212; border-top: 1px solid #262626; }
        #message-input { flex: 1; margin-bottom: 0; border-radius: 20px; border: none; padding: 12px 15px; background: #262626; color: white; outline: none;}
        #send-btn { background: #0b93f6; border: none; color: white; font-weight: bold; padding: 12px 20px; border-radius: 20px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="notify-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="gateway-screen" class="screen center-screen">
        <h1 class="jarvis-title">JARVIS</h1>
        <button class="primary-btn" onclick="nav('admin-login-screen')">Admin Portal</button>
        <button class="secondary-btn" onclick="nav('user-login-screen')">User Login</button>
    </div>

    <div id="admin-login-screen" class="screen center-screen hidden">
        <h1 class="jarvis-title">JARVIS</h1>
        <h2>Admin Access</h2>
        <input type="text" id="admin-user" placeholder="Admin Name">
        <input type="password" id="admin-pass" placeholder="Passcode">
        <button class="primary-btn" id="btn-admin-login">Authorize</button>
        <button class="secondary-btn" onclick="nav('gateway-screen')">Back</button>
    </div>

    <div id="admin-panel-screen" class="screen hidden">
        <div class="admin-header">
            Jarvis Control Panel
            <button class="logout-btn" onclick="nav('gateway-screen')">Exit</button>
        </div>
        <div class="admin-section">
            <h3 style="margin-bottom: 10px;">Create New User</h3>
            <input type="text" id="new-username" placeholder="New Username">
            <input type="text" id="new-password" placeholder="Set Password">
            <button class="primary-btn" id="btn-create-user">Create Account</button>
            <button class="secondary-btn" onclick="openAdminLogs()" style="margin-top:15px; background:#ff9f0a; color:#000;">Monitor Chat Logs</button>
        </div>
        <div style="flex: 1; overflow-y: auto; padding: 20px;" id="admin-user-list"></div>
    </div>

    <div id="admin-logs-screen" class="screen hidden">
        <div class="admin-header">
            Global Database Logs
            <button class="logout-btn" onclick="nav('admin-panel-screen')">Back</button>
        </div>
        <div style="flex: 1; overflow-y: auto; padding: 15px;" id="global-log-list"></div>
    </div>

    <div id="user-login-screen" class="screen center-screen hidden">
        <h1 class="jarvis-title">JARVIS</h1>
        <h2>Secure Login</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button class="primary-btn" id="btn-user-login">Enter</button>
        <button class="secondary-btn" onclick="nav('gateway-screen')">Back</button>
    </div>

    <div id="contacts-screen" class="screen hidden">
        <div class="admin-header">
            <span id="my-display-name">Chats</span>
            <button class="logout-btn" onclick="logoutUser()">Log Out</button>
        </div>
        <div id="user-contact-list" style="flex: 1; overflow-y: auto;"></div>
    </div>

    <div id="chat-screen" class="screen hidden">
        <div class="chat-header">
            <button class="back-btn" onclick="nav('contacts-screen')">‹</button>
            <div class="chat-header-info">
                <span class="chat-header-name" id="chat-partner-name">Name</span>
                <span class="chat-header-status" id="chat-partner-status">Offline</span>
            </div>
        </div>
        <div class="chat-container" id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, setDoc, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAi1KZ89UZmut2d7DIi2YiWxQFDQdEpjR8",
            authDomain: "pvtcht-panda.firebaseapp.com",
            projectId: "pvtcht-panda",
            storageBucket: "pvtcht-panda.firebasestorage.app",
            messagingSenderId: "755859453943",
            appId: "1:755859453943:web:808c5a2ecd754a947ca0f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const audio = document.getElementById("notify-sound");

        window.nav = function(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        };

        // Unlock audio context on any screen tap so notifications work
        document.body.addEventListener('click', function unlockAudio() {
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
            document.body.removeEventListener('click', unlockAudio);
        }, { once: true });

        let myUsername = localStorage.getItem("jarvisUser");
        let activeRoom = null;
        let activePartner = null;
        let chatSub = null;
        let adminLogsSub = null;
        let allUsersData = {};

        if (myUsername) {
            document.getElementById("my-display-name").textContent = myUsername;
            updateDoc(doc(db, "auth_users", myUsername), { isOnline: true });
            nav("contacts-screen");
            loadContacts();
        }

        document.addEventListener("visibilitychange", () => {
            if(myUsername) updateDoc(doc(db, "auth_users", myUsername), { isOnline: document.visibilityState === 'visible' });
        });

        // --- ADMIN PORTAL ---
        document.getElementById("btn-admin-login").onclick = () => {
            const user = document.getElementById("admin-user").value.trim();
            const pass = document.getElementById("admin-pass").value.trim();
            if (user === "Jigar" && pass === "162709") {
                document.getElementById("admin-user").value = "";
                document.getElementById("admin-pass").value = "";
                nav("admin-panel-screen");
                loadAdminUsers();
            } else alert("Access Denied.");
        };

        document.getElementById("btn-create-user").onclick = async () => {
            const uname = document.getElementById("new-username").value.trim();
            const pass = document.getElementById("new-password").value.trim();
            if (!uname || !pass) return;
            await setDoc(doc(db, "auth_users", uname), { username: uname, password: pass, isOnline: false });
            document.getElementById("new-username").value = "";
            document.getElementById("new-password").value = "";
            alert(`User ${uname} created!`);
        };

        function loadAdminUsers() {
            onSnapshot(collection(db, "auth_users"), (snapshot) => {
                const list = document.getElementById("admin-user-list");
                list.innerHTML = "<h3>Managed Accounts</h3><br>";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const div = document.createElement("div");
                    div.className = "admin-user-card";
                    div.innerHTML = `<div><strong>${data.username}</strong><br><span style="font-size:0.8rem; color:#888;">Pass: ${data.password}</span></div><button class="delete-btn">Delete</button>`;
                    div.querySelector(".delete-btn").onclick = () => { if(confirm(`Delete ${data.username}?`)) deleteDoc(doc(db, "auth_users", data.username)); };
                    list.appendChild(div);
                });
            });
        }

        // Admin Log Viewer
        window.openAdminLogs = function() {
            nav("admin-logs-screen");
            if(adminLogsSub) adminLogsSub();
            adminLogsSub = onSnapshot(collection(db, "messages"), (snapshot) => {
                const list = document.getElementById("global-log-list");
                list.innerHTML = "";
                let msgs = [];
                snapshot.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
                msgs.sort((a, b) => b.time - a.time); // Newest first
                
                msgs.forEach(msg => {
                    const div = document.createElement("div");
                    div.className = "log-card";
                    const statusTxt = msg.isDeleted ? '<span style="color:#ff3b30">[User Deleted This]</span>' : '';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between;">
                            <strong style="color:#0b93f6">${msg.sender}</strong>
                            <button class="delete-btn" style="padding:4px 8px;">Perm Delete</button>
                        </div>
                        <div style="margin-top:5px; color:#ccc;">${msg.text} ${statusTxt}</div>
                        <div style="font-size:0.7rem; color:#666; margin-top:5px;">Room: ${msg.room}</div>
                    `;
                    div.querySelector("button").onclick = () => {
                        if(confirm("Permanently wipe this from the database?")) deleteDoc(doc(db, "messages", msg.id));
                    };
                    list.appendChild(div);
                });
            });
        };

        // --- USER LOGIC ---
        document.getElementById("btn-user-login").onclick = async () => {
            const uname = document.getElementById("login-username").value.trim();
            const pass = document.getElementById("login-password").value.trim();
            if (!uname || !pass) return;

            const userDoc = await getDoc(doc(db, "auth_users", uname));
            if (userDoc.exists() && userDoc.data().password === pass) {
                myUsername = uname;
                localStorage.setItem("jarvisUser", myUsername);
                document.getElementById("my-display-name").textContent = myUsername;
                await updateDoc(doc(db, "auth_users", myUsername), { isOnline: true });
                nav("contacts-screen");
                loadContacts();
            } else alert("Invalid Username or Password.");
        };

        window.logoutUser = async function() {
            if(myUsername) await updateDoc(doc(db, "auth_users", myUsername), { isOnline: false });
            localStorage.removeItem("jarvisUser");
            myUsername = null;
            nav("gateway-screen");
        };

        function loadContacts() {
            onSnapshot(collection(db, "auth_users"), (snapshot) => {
                const list = document.getElementById("user-contact-list");
                list.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    allUsersData[data.username] = data; 
                    if (docSnap.id === myUsername) return; 
                    
                    const div = document.createElement("div");
                    div.className = "contact-card";
                    const statusClass = data.isOnline ? "online-dot" : "online-dot offline-dot";
                    div.innerHTML = `
                        <div class="avatar">${data.username.charAt(0).toUpperCase()}<div class="${statusClass}"></div></div>
                        <div class="contact-info">
                            <div class="contact-name">${data.username}</div>
                            <div class="contact-status-text">${data.isOnline ? "Online" : "Offline"}</div>
                        </div>`;
                    div.onclick = () => openChatRoom(data.username);
                    list.appendChild(div);
                });

                if (activePartner && allUsersData[activePartner]) {
                    const p = allUsersData[activePartner];
                    document.getElementById("chat-partner-status").textContent = p.isOnline ? "Online" : "Offline";
                    document.getElementById("chat-partner-status").style.color = p.isOnline ? "#34C759" : "#8e8e93";
                }
            });
        }

        function openChatRoom(partnerName) {
            activePartner = partnerName;
            document.getElementById("chat-partner-name").textContent = partnerName;
            activeRoom = [myUsername, partnerName].sort().join("_");
            nav("chat-screen");

            if(chatSub) chatSub(); 
            let initialLoad = true;
            
            chatSub = onSnapshot(query(collection(db, "messages"), where("room", "==", activeRoom)), (snapshot) => {
                let msgs = [];
                snapshot.forEach(docSnap => msgs.push({ id: docSnap.id, ...docSnap.data() }));
                msgs.sort((a, b) => a.time - b.time); 
                
                const box = document.getElementById("chat-box");
                box.innerHTML = "";
                msgs.forEach(msg => {
                    const isMe = msg.sender === myUsername;
                    const wrap = document.createElement("div");
                    wrap.className = `message-wrapper ${isMe ? 'sent' : 'received'}`;
                    
                    // Display Logic for Deleted Messages
                    let displayText = msg.isDeleted ? "🚫 This message was deleted" : msg.text;
                    let bubbleClass = msg.isDeleted ? "message deleted-msg" : "message";
                    
                    wrap.innerHTML = `<div class="${bubbleClass}">${displayText}</div>`;
                    
                    // User Soft Delete Function
                    if (isMe && !msg.isDeleted) {
                        wrap.onclick = async () => {
                            if(confirm("Delete this message?")) {
                                await updateDoc(doc(db, "messages", msg.id), { isDeleted: true });
                            }
                        };
                    }
                    box.appendChild(wrap);
                });

                if (!initialLoad && snapshot.docChanges().length > 0) {
                    const change = snapshot.docChanges()[snapshot.docChanges().length - 1];
                    if (change.type === "added" && change.doc.data().sender !== myUsername) {
                        audio.play().catch(e => console.log("Audio blocked"));
                    }
                }
                
                box.scrollTop = box.scrollHeight;
                initialLoad = false;
            });
        }

        async function sendChatMessage() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text || !activeRoom) return;
            
            input.value = ""; 
            await addDoc(collection(db, "messages"), {
                room: activeRoom,
                text: text,
                sender: myUsername,
                time: Date.now(),
                isDeleted: false
            });
        }

        document.getElementById("send-btn").onclick = sendChatMessage;
        document.getElementById("message-input").onkeypress = (e) => { if (e.key === "Enter") sendChatMessage(); };

    </script>
</body>
</html>
