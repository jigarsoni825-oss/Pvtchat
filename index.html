<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panda Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; flex-direction: column; height: 100vh; }
        
        .header { background-color: #1e1e1e; padding: 15px; text-align: center; border-bottom: 1px solid #333; font-weight: bold; font-size: 1.2rem; }
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 1rem; line-height: 1.4; word-wrap: break-word; }
        .message.sent { background-color: #0b93f6; color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        .message.received { background-color: #2c2c2e; color: white; align-self: flex-start; border-bottom-left-radius: 5px; }
        
        .input-area { background-color: #1e1e1e; padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #333; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: none; background-color: #2c2c2e; color: white; font-size: 1rem; outline: none; }
        button { background-color: #0b93f6; color: white; border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">Secure Chat - Panda Line</div>

    <div class="chat-container" id="chat-box">
        </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a message... (Emojis work!)">
        <button id="send-btn">Send</button>
    </div>

    <script type="module">
        // Import Firebase core and Firestore database
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Your exact Firebase keys
        const firebaseConfig = {
            apiKey: "AIzaSyAi1KZ89UZmut2d7DIi2YiWxQFDQdEpjR8",
            authDomain: "pvtcht-panda.firebaseapp.com",
            projectId: "pvtcht-panda",
            storageBucket: "pvtcht-panda.firebasestorage.app",
            messagingSenderId: "755859453943",
            appId: "1:755859453943:web:808c5a2ecd754a947ca0f2"
        };

        // Initialize App and Database
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Grab the elements from the screen
        const chatBox = document.getElementById("chat-box");
        const messageInput = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");

        // Create a temporary ID so the app knows which messages are yours
        let myUserId = localStorage.getItem("myUserId");
        if (!myUserId) {
            myUserId = "user_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("myUserId", myUserId);
        }

        // 1. LISTEN FOR NEW MESSAGES (Live Sync)
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = ""; // Clear box before re-drawing
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const messageElement = document.createElement("div");
                
                // If I sent it, make it blue on the right. Otherwise, gray on the left.
                if (data.senderId === myUserId) {
                    messageElement.className = "message sent";
                } else {
                    messageElement.className = "message received";
                }
                
                messageElement.textContent = data.text;
                chatBox.appendChild(messageElement);
            });
            
            // Auto-scroll to the newest message
            chatBox.scrollTop = chatBox.scrollHeight; 
        });

        // 2. SEND A MESSAGE
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (text === "") return;

            messageInput.value = ""; // Clear input immediately so it feels fast

            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    senderId: myUserId,
                    timestamp: serverTimestamp()
                });
            } catch (error) {
                console.error("Error sending message: ", error);
                alert("Message failed to send. Check the console.");
            }
        }

        // Trigger send when clicking the button or pressing Enter
        sendBtn.addEventListener("click", sendMessage);
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
